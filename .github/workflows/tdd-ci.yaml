name: Java TDD Automation CI

# 코드가 Push되거나 Pull Request가 열릴 때 자동으로 실행
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # 깃허브가 제공하는 가상 리눅스 환경에서 실행
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 저장소에 있는 동규님의 코드를 가상 환경으로 가져옴
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 자바 실행을 위한 JDK 17 환경 설정
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 소스 및 테스트 코드 컴파일
    - name: Compile Java Files
      run: |
        javac -cp ".:lib/*" Triangle.java TriangleTest.java

    # 4. JUnit 5로 30개 테스트 케이스 자동 실행
    - name: Run All 30 Tests
      run: |
        java -jar lib/junit-platform-console-standalone-1.10.2.jar -cp . -c TriangleTest